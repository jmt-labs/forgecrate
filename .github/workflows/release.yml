name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (z.B. v1.0.0)'
        required: true

jobs:
  release:
    name: Release ${{ github.event.inputs.version }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Release-Branch anlegen
        run: |
          git checkout -b releases/${{ github.event.inputs.version }}
          git push origin releases/${{ github.event.inputs.version }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Tests ausführen
        run: go test ./...

      - name: Binaries bauen
        run: |
          HASH=$(git rev-parse --short HEAD)
          mkdir -p dist

          build() {
            local goos=$1 goarch=$2
            local name="${HASH}-claude-setup-${goos}-${goarch}"
            [ "$goos" = "windows" ] && name="${name}.exe"
            GOOS=$goos GOARCH=$goarch go build -o "dist/${name}" ./cmd/claude-setup/
          }

          build linux  amd64
          build linux  arm64
          build windows amd64
          build windows arm64
          build darwin  arm64

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          files: dist/*
