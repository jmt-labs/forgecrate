version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/forgecrate/
    binary: forgecrate
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: amd64

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

nfpms:
  - package_name: forgecrate
    maintainer: Markus Hartmann <markush1986@gmail.com>
    description: Reproducible Claude Code setup for any repository.
    homepage: https://github.com/jmt-labs/forgecrate
    license: MIT
    formats:
      - deb
    bindir: /usr/local/bin

brews:
  - name: forgecrate
    repository:
      owner: jmt-labs
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    homepage: https://github.com/jmt-labs/forgecrate
    description: Reproducible Claude Code setup for any repository.
    install: |
      bin.install "forgecrate"
    test: |
      system "#{bin}/forgecrate", "--version"

